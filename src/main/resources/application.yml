spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/ai_helper_bot_db
    username: ${DB_USERNAME:bot_user}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/ai-helper-bot}
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8180/realms/ai-helper-bot/protocol/openid-connect/certs}
          # Cache JWK sets to avoid fetching on every request
          cache:
            enabled: true
  ai:
    ollama:
      base-url: http://localhost:11434
      embedding:
        enabled: true
        options:
          model: nomic-embed-text
      init:
        pull-model-strategy: never

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db

app:
  adapters:
    inbound:
      enabled: true

rag:
  storage:
    blob:
      url: ${AZURE_BLOB_URL:}
  llm:
    base-url: ${LLM_BASE_URL:https://openrouter.ai/api/v1}
    api-key: ${OPEN_ROUTER_API_KEY}
    model: ${LLM_MODEL:qwen/qwen3-next-80b-a3b-instruct}
    temperature: 0.3
    max-tokens: 1024
    max-documents: 5
    http-referer: ${LLM_HTTP_REFERER:}
    app-title: AiHelperBot
    unsatisfactory-phrases:
      - "not explicitly defined"
      - "not specified"
  guide:
    guide-url: ${GUIDE_URL:}
    chunk-size: 1500
    overlap: 200
    pages:
      start: 1
      glossary: 3
      support: 2
      inbox: 10
      remind-submission: 15
      gp-employee: 20
      gp-manager: 25
  validation:
    quick-filter:
      min-length: 2
    language-detector:
      accepted-languages: ENGLISH
      min-confidence: 0.5
      short-input-threshold: 10
    domain-checker:
      max-search-results: 1
      min-score: 0.5
