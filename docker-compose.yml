services:
  db:
    image: postgres:15.8-alpine
    container_name: ai-helper-bot-db
    environment:
      POSTGRES_DB: ai_helper_bot_db
      POSTGRES_USER: bot_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?error: DB_PASSWORD not set}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot_user -d ai_helper_bot_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-helper-bot-network
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: ai-helper-bot-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak_db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_change_me}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8180:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ai-helper-bot-network
    restart: unless-stopped

volumes:
  pgdata:
    driver: local

networks:
  ai-helper-bot-network:
    driver: bridge
