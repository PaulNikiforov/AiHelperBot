services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-helper-bot-app
    environment:
      # Database
      DB_USERNAME: bot_user
      DB_PASSWORD: ${DB_PASSWORD:?error: DB_PASSWORD not set}
      DB_HOST: db
      DB_PORT: 5432
      # LLM
      OPEN_ROUTER_API_KEY: ${OPEN_ROUTER_API_KEY:?error: OPEN_ROUTER_API_KEY not set}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL:?error: LLM_MODEL not set}
      # Storage
      AZURE_BLOB_URL: ${AZURE_BLOB_URL:-}
      GUIDE_URL: ${GUIDE_URL:-}
      # Actuator
      MANAGEMENT_HEALTH_PROBES_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ai-helper-bot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health/liveness"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
